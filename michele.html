    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 45% 55%, #2d3a4a 0%, #1a1a1a 70%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 380px;
      width: 90%;
      animation: fadeUp 0.7s ease both;
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 40px rgba(37,211,102,0.35);
      animation: pulse 2s ease infinite;
    }

    .icon-wrap svg { width: 38px; height: 38px; fill: #fff; }

    h1 {
      font-family: 'Playfair Display', serif;
      color: #f5f0eb;
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.01em;
    }

    p {
      color: #a0a0a0;
      font-weight: 300;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .dot {
      width: 8px; height: 8px;
      background: #25D366;
      border-radius: 50%;
      animation: bounce 1.2s ease infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(37,211,102,0.35); }
      50%       { box-shadow: 0 0 60px rgba(37,211,102,0.55); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
  </style>
